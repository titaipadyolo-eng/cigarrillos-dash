name: Backfill histórico (una sola vez)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cargar incidentes históricos
        run: python backfill_historico.py

      - name: Guardar cambios en la base de datos
        run: |
          git config user.name "scraper-bot"
          git config user.email "scraper-bot@users.noreply.github.com"
          git add data/incidentes.db
          git diff --staged --quiet || git commit -m "Backfill historico de incidentes 2026"
          git push
